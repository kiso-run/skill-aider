# LLM provider — determines which env var receives the API key
#
#   "openrouter" → OPENROUTER_API_KEY (default)
#   "openai"     → OPENAI_API_KEY
#   "anthropic"  → ANTHROPIC_API_KEY
#   "deepseek"   → DEEPSEEK_API_KEY
#
# The API key value comes from KISO_SKILL_AIDER_API_KEY env var.
# run.py maps it to the provider's expected env var name.
provider = "openrouter"

# Optional: custom base URL (for self-hosted or alternative endpoints)
# api_base = "https://my-llm-proxy.example.com/v1"

# Default mode: "architect", "code", or "ask"
mode = "architect"

# Models (use provider-specific prefixes, e.g. openrouter/org/model)
architect_model = "openrouter/z-ai/glm-5"
editor_model = "openrouter/deepseek/deepseek-v3.2"
weak_model = "openrouter/deepseek/deepseek-v3.2"

# Context mapping — how many tokens for the repo map
map_tokens = 4096

# Edit format for the editor model in architect mode
editor_edit_format = "udiff"

# Git settings
auto_commits = true
commit_language = "en"
