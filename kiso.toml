[kiso]
type = "skill"
name = "aider"
version = "0.1.0"
description = "Code editing with aider"

[kiso.skill]
summary = "Edit code, refactor, fix bugs, or ask questions about a codebase"
usage_guide = """\
Use aider for code editing, refactoring, bug fixes, and code questions. \
In "architect" mode (default), a planning model designs changes and an \
editor model applies them. Use "ask" mode to get answers about code \
without making changes. Always specify the relevant files. \
The workspace is the session directory."""

[kiso.skill.args]
message = { type = "string", required = true, description = "instruction or question for aider" }
files = { type = "string", required = false, description = "comma-separated file paths to edit" }
mode = { type = "string", required = false, description = "'architect' (default), 'code', or 'ask'" }
read_only_files = { type = "string", required = false, description = "comma-separated files for read-only context" }

[kiso.skill.env]
api_key = { required = true }   # → KISO_SKILL_AIDER_API_KEY

[kiso.deps]
python = ">=3.11"
bin = ["git"]
